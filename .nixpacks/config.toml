[phases.install]
cmds = ["composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --no-scripts"]

[phases.setup]
cmds = ["php artisan package:discover --ansi || true"]

[start]
cmd = "php artisan package:discover --ansi && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"
